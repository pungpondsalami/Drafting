# .github/workflows/windows.yml
name: Windows MSIX Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gvsbuild
        run: pip install gvsbuild

      - name: Cache gvsbuild
        id: cache-gtk
        uses: actions/cache@v4
        with:
          path: C:\gtk-build
          key: gvsbuild-gtk4-libadwaita-${{ runner.os }}-v3

      - name: Build GTK4 + libadwaita
        if: steps.cache-gtk.outputs.cache-hit != 'true'
        run: gvsbuild build gtk4 libadwaita

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set GTK env vars
        run: |
          $gtk = "C:\gtk-build\gtk\x64\release"
          echo "PKG_CONFIG_PATH=$gtk\lib\pkgconfig"    >> $env:GITHUB_ENV
          echo "PATH=$gtk\bin;$env:PATH"                >> $env:GITHUB_ENV
          echo "GTK_ROOT=$gtk"                          >> $env:GITHUB_ENV
          # Append GTK lib ต่อท้าย LIB เดิม (ไม่ทับ Windows SDK)
          echo "LIB=$env:LIB;$gtk\lib"                 >> $env:GITHUB_ENV
          
      - name: Build Drafting
        run: cargo build --release --target x86_64-pc-windows-msvc --locked

      - name: Compile GResource
        run: |
          $gtk = "C:\gtk-build\gtk\x64\release"
          & "$gtk\bin\glib-compile-resources.exe" `
            src\drafting.gresource.xml `
            --target=src\drafting.gresource `
            --sourcedir=src

      - name: Collect app files
        run: |
          $dst = "dist\drafting"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null

          Copy-Item "target\x86_64-pc-windows-msvc\release\drafting.exe" $dst\
          Copy-Item "src\drafting.gresource" $dst\

          New-Item -ItemType Directory -Force -Path "$dst\share\glib-2.0\schemas" | Out-Null
          Copy-Item "data\com.pungpondsalami.drafting.gschema.xml" "$dst\share\glib-2.0\schemas\"

          # Bundle Cantarell font
          New-Item -ItemType Directory -Force -Path "$dst\share\fonts\cantarell" | Out-Null
          Invoke-WebRequest -Uri "https://download.gnome.org/sources/cantarell-fonts/0.303/cantarell-fonts-0.303.tar.xz" `
                            -OutFile "cantarell.tar.xz"
          tar -xf cantarell.tar.xz
          Copy-Item "cantarell-fonts-0.303\prebuilt\*.otf" "$dst\share\fonts\cantarell\"

          Copy-Item "data\fonts.conf" $dst\

          Copy-Item "C:\gtk-build\gtk\x64\release\share\glib-2.0\schemas\*" `
                    "$dst\share\glib-2.0\schemas\"

      - name: Compile GLib schemas
        run: |
          $gtk = "C:\gtk-build\gtk\x64\release"
          & "$gtk\bin\glib-compile-schemas.exe" "dist\drafting\share\glib-2.0\schemas\"

      - name: Collect GTK DLLs
        run: |
          $gtk_bin = "C:\gtk-build\gtk\x64\release\bin"
          $dst     = "dist\drafting"

          $dlls = @(
            "gtk-4-1.dll",
            "adwaita-1-0.dll",
            "glib-2.0-0.dll",
            "gobject-2.0-0.dll",
            "gthread-2.0-0.dll",
            "gio-2.0-0.dll",
            "gmodule-2.0-0.dll",
            "pango-1.0-0.dll",
            "pangocairo-1.0-0.dll",
            "pangoft2-1.0-0.dll",
            "pangowin32-1.0-0.dll",
            "cairo-2.dll",
            "cairo-gobject-2.dll",
            "gdk_pixbuf-2.0-0.dll",
            "harfbuzz.dll",
            "harfbuzz-gobject.dll",
            "epoxy-0.dll",
            "fribidi-0.dll",
            "graphene-1.0-0.dll",
            "libpng16.dll",
            "zlib1.dll",
            "freetype-6.dll",
            "fontconfig-1.dll",
            "libexpat.dll",
            "pixman-1-0.dll",
            "intl.dll",
            "pcre2-8-0.dll",
            "ffi-8.dll",
            "harfbuzz-subset.dll",
            "tiff.dll",
            "jpeg62.dll",
            "cairo-script-interpreter-2.dll",
            "iconv.dll"
          )

          foreach ($dll in $dlls) {
            $src = Join-Path $gtk_bin $dll
            if (Test-Path $src) {
              Copy-Item $src $dst\
            } else {
              Write-Warning "DLL not found (skipped): $dll"
            }
          }

          New-Item -ItemType Directory -Force -Path "$dst\share\icons" | Out-Null
          $hicolor = "C:\gtk-build\gtk\x64\release\share\icons\hicolor"
          if (Test-Path $hicolor) {
            Copy-Item $hicolor "$dst\share\icons\hicolor" -Recurse
          }

          New-Item -ItemType Directory -Force -Path "$dst\share\icons\hicolor\512x512\apps" | Out-Null
          Copy-Item "data\icons\hicolor\512x512\apps\com.pungpondsalami.drafting.png" `
                    "$dst\share\icons\hicolor\512x512\apps\"

      - name: Prepare MSIX assets
        run: |
          New-Item -ItemType Directory -Force -Path "msix\Assets" | Out-Null
          $src = "data\icons\hicolor\512x512\apps\com.pungpondsalami.drafting.png"
          magick $src -resize 44x44   msix\Assets\Square44x44Logo.png
          magick $src -resize 150x150 msix\Assets\Square150x150Logo.png
          magick $src -resize 50x50   msix\Assets\StoreLogo.png

      - name: Create MSIX structure
        run: |
          New-Item -ItemType Directory -Force -Path "msix\drafting" | Out-Null
          Copy-Item "dist\drafting\*" "msix\drafting\" -Recurse

      - name: Write AppxManifest.xml
        run: |
          $manifest = @'
          <?xml version="1.0" encoding="utf-8"?>
          <Package
            xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
            xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
            xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">

            <Identity
              Name="com.pungpondsalami.drafting"
              Publisher="CN=Drafting"
              Version="0.1.0.0"
              ProcessorArchitecture="x64"/>

            <Properties>
              <DisplayName>Drafting</DisplayName>
              <PublisherDisplayName>Supakit Suptorranee</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>

            <Dependencies>
              <TargetDeviceFamily
                Name="Windows.Desktop"
                MinVersion="10.0.17763.0"
                MaxVersionTested="10.0.22621.0"/>
            </Dependencies>

            <Resources>
              <Resource Language="en-US"/>
            </Resources>

            <Applications>
              <Application
                Id="Drafting"
                Executable="drafting\drafting.exe"
                EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements
                  DisplayName="Drafting"
                  Description="A 2D CAD application"
                  BackgroundColor="transparent"
                  Square150x150Logo="Assets\Square150x150Logo.png"
                  Square44x44Logo="Assets\Square44x44Logo.png"/>
              </Application>
            </Applications>

            <Capabilities>
              <rescap:Capability Name="runFullTrust"/>
            </Capabilities>

          </Package>
          '@
          $manifest | Out-File -FilePath msix\AppxManifest.xml -Encoding utf8

      - name: Find and run MakeAppx
        run: |
          $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
                        -Recurse -Filter "makeappx.exe" |
                      Where-Object { $_.FullName -match "x64" } |
                      Select-Object -First 1 -ExpandProperty FullName

          if (-not $makeappx) {
            throw "makeappx.exe not found"
          }

          Write-Host "Using: $makeappx"
          & $makeappx pack /d msix /p drafting.msix /nv

      - name: Create self-signed certificate
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=Drafting" `
            -KeyUsage DigitalSignature `
            -FriendlyName "Drafting Self-Signed" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          
          $thumbprint = $cert.Thumbprint
          echo "CERT_THUMBPRINT=$thumbprint" >> $env:GITHUB_ENV
          
          # Export cert สำหรับให้ผู้ใช้ไป trust
          Export-Certificate -Cert $cert -FilePath drafting-cert.cer

      - name: Sign MSIX
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
                        -Recurse -Filter "signtool.exe" |
                      Where-Object { $_.FullName -match "x64" } |
                      Select-Object -First 1 -ExpandProperty FullName
          
          & $signtool sign `
            /sha1 $env:CERT_THUMBPRINT `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            drafting.msix

      - name: Upload cert for users
        uses: actions/upload-artifact@v4
        with:
          name: drafting-certificate
          path: drafting-cert.cer

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: drafting-windows-msix
          path: drafting.msix
