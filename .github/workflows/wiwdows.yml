# .github/workflows/windows.yml
name: Windows MSIX Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gvsbuild
        run: pip install gvsbuild

      - name: Cache gvsbuild
        id: cache-gtk
        uses: actions/cache@v4
        with:
          path: C:\gtk-build
          key: gvsbuild-gtk4-libadwaita-${{ runner.os }}-v1

      - name: Build GTK4 + libadwaita
        if: steps.cache-gtk.outputs.cache-hit != 'true'
        run: |
          gvsbuild build gtk4 libadwaita

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set GTK env vars
        run: |
          echo "PKG_CONFIG_PATH=C:\gtk-build\gtk\x64\release\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "PATH=C:\gtk-build\gtk\x64\release\bin;$env:PATH" >> $env:GITHUB_ENV
          echo "LIB=C:\gtk-build\gtk\x64\release\lib;$env:LIB" >> $env:GITHUB_ENV

      - name: Build Drafting
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Collect DLLs
        run: |
          mkdir -p dist\drafting
          copy target\x86_64-pc-windows-msvc\release\drafting.exe dist\drafting\

          # Copy GTK DLLs
          $gtk_bin = "C:\gtk-build\gtk\x64\release\bin"
          $dlls = @(
            "gtk-4-1.dll",
            "gdk-4-1.dll",  
            "adwaita-1.dll",
            "glib-2.0-0.dll",
            "gobject-2.0-0.dll",
            "gio-2.0-0.dll",
            "gmodule-2.0-0.dll",
            "pango-1.0-0.dll",
            "pangocairo-1.0-0.dll",
            "cairo-2.dll",
            "cairo-gobject-2.dll",
            "gdk_pixbuf-2.0-0.dll",
            "harfbuzz.dll",
            "epoxy-0.dll",
            "fribidi-0.dll"
          )
          foreach ($dll in $dlls) {
            $src = Join-Path $gtk_bin $dll
            if (Test-Path $src) {
              Copy-Item $src dist\drafting\
            } else {
              Write-Warning "Not found: $dll"
            }
          }

          # Copy GLib schemas
          mkdir -p dist\drafting\share\glib-2.0\schemas
          copy "C:\gtk-build\gtk\x64\release\share\glib-2.0\schemas\*" dist\drafting\share\glib-2.0\schemas\

          # Copy icons
          mkdir -p dist\drafting\share\icons
          xcopy /E /I "C:\gtk-build\gtk\x64\release\share\icons\hicolor" dist\drafting\share\icons\hicolor\

      - name: Compile GLib schemas
        run: |
          $glib_compile = "C:\gtk-build\gtk\x64\release\bin\glib-compile-schemas.exe"
          & $glib_compile dist\drafting\share\glib-2.0\schemas\

      - name: Create MSIX structure
        run: |
          mkdir -p msix\drafting

          # Copy app files
          xcopy /E /I dist\drafting msix\drafting\

          # Copy app icon (ถ้ามี)
          mkdir -p msix\drafting\Assets
          # TODO: ใส่ไฟล์ icon จริง (.png ขนาดต่างๆ)

      - name: Write AppxManifest.xml
        run: |
          $manifest = @'
          <?xml version="1.0" encoding="utf-8"?>
          <Package
            xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
            xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
            xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">

            <Identity
              Name="com.pungpondsalami.drafting"
              Publisher="CN=Drafting"
              Version="0.1.0.0"
              ProcessorArchitecture="x64"/>

            <Properties>
              <DisplayName>Drafting</DisplayName>
              <PublisherDisplayName>Supakit Suptorranee</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>

            <Dependencies>
              <TargetDeviceFamily
                Name="Windows.Desktop"
                MinVersion="10.0.17763.0"
                MaxVersionTested="10.0.22621.0"/>
            </Dependencies>

            <Resources>
              <Resource Language="en-US"/>
            </Resources>

            <Applications>
              <Application
                Id="Drafting"
                Executable="drafting\drafting.exe"
                EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements
                  DisplayName="Drafting"
                  Description="A 2D CAD application"
                  BackgroundColor="transparent"
                  Square150x150Logo="Assets\Square150x150Logo.png"
                  Square44x44Logo="Assets\Square44x44Logo.png"/>
              </Application>
            </Applications>

            <Capabilities>
              <rescap:Capability Name="runFullTrust"/>
            </Capabilities>

          </Package>
          '@
          $manifest | Out-File -FilePath msix\AppxManifest.xml -Encoding utf8

      - name: Pack MSIX
        run: |
          # MakeAppx มากับ Windows SDK บน runner
          $makeappx = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\makeappx.exe"
          & $makeappx pack /d msix /p drafting.msix /nv

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: drafting-windows-msix
          path: drafting.msix